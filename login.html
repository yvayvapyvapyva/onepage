<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Авторизация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        body {
            background: rgba(10,11,15,0.95);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: clamp(12px, 3vw, 20px);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            box-sizing: border-box;
        }
        .auth-card {
            background: rgba(25,25,30,0.85); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: clamp(24px, 6vw, 32px) clamp(16px, 5vw, 28px);
            max-width: 340px; width: 100%;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-sizing: border-box;
        }
        .auth-title { font-size: 24px; font-weight: 800; text-align: center; color: #fff; margin-bottom: 24px; }
        .auth-tabs { display: flex; margin-bottom: 20px; background: rgba(255,255,255,0.06); border-radius: 12px; padding: 3px; }
        .auth-tab {
            flex: 1; text-align: center; padding: 10px; border-radius: 10px;
            font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.5);
            cursor: pointer; transition: all 0.2s; border: none;
            background: transparent; font-family: inherit;
        }
        .auth-tab.active { background: rgba(0,122,255,0.3); color: #fff; }
        .auth-field { margin-bottom: 12px; }
        .auth-field input {
            width: 100%; padding: 14px 16px; border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06); color: #f5f7fa;
            font-size: 16px; outline: none; box-sizing: border-box; font-family: inherit;
        }
        .auth-field input:focus { border-color: rgba(0,122,255,0.5); }
        .auth-field input::placeholder { color: rgba(255,255,255,0.3); }
        .auth-btn {
            width: 100%; padding: 14px; border-radius: 14px; border: none;
            font-size: 17px; font-weight: 700; color: #fff;
            cursor: pointer; transition: opacity 0.2s; font-family: inherit; margin-top: 8px;
        }
        .auth-btn:active { opacity: 0.8; }
        .auth-btn:disabled { opacity: 0.5; }
        .auth-btn-login { background: linear-gradient(180deg, rgba(0,122,255,0.9), rgba(0,90,200,0.85)); }
        .auth-btn-register { background: linear-gradient(180deg, rgba(52,199,89,0.9), rgba(40,160,70,0.85)); }
        .auth-error { font-size: 13px; color: #FF453A; text-align: center; margin-top: 8px; display: none; }
        .auth-success { font-size: 13px; color: #30D158; text-align: center; margin-top: 8px; display: none; }
        .auth-loader { text-align: center; padding: 40px; color: rgba(255,255,255,0.5); font-size: 15px; }
        .auth-spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #fff; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
    </style>
</head>
<body>
<div id="authContainer" class="auth-card">
    <div id="authLoader" class="auth-loader">
        <div class="auth-spinner"></div>
        <div>Авторизация...</div>
    </div>
    <div id="authForm" style="display:none">
        <div class="auth-title">Маршруты</div>
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Вход</button>
            <button class="auth-tab" data-tab="register">Регистрация</button>
        </div>
        <div class="auth-field">
            <input type="text" id="authLogin" placeholder="Логин" autocomplete="username">
        </div>
        <div class="auth-field">
            <input type="password" id="authPassword" placeholder="Пароль" autocomplete="current-password">
        </div>
        <div id="authNameField" class="auth-field" style="display:none">
            <input type="text" id="authName" placeholder="Ваше имя">
        </div>
        <button id="authActionBtn" class="auth-btn auth-btn-login">Войти</button>
        <div id="authError" class="auth-error"></div>
        <div id="authSuccess" class="auth-success"></div>
    </div>
</div>

<script src="assets/js/config.js"></script>
<script src="https://unpkg.com/@vkontakte/vk-bridge@latest/dist/browser.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const API_URL = 'https://functions.yandexcloud.net/d4e6qbc1mm9j44h0na3n';
const AUTH_KEY = '3api_auth';
const REDIRECT = new URLSearchParams(window.location.search).get('redirect') || '/';

function saveAuth(platform, login, password, name) {
    localStorage.setItem(AUTH_KEY, JSON.stringify({ platform, login, password, name }));
}

async function tryAutoLogin() {
    if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        if (Telegram.WebApp.version && parseFloat(Telegram.WebApp.version) >= 7.0) {
            try { Telegram.WebApp.requestFullscreen?.(); } catch (e) {}
            try { Telegram.WebApp.disableVerticalSwipes?.(); } catch (e) {}
        }
        const user = Telegram.WebApp.initDataUnsafe?.user;
        if (user) {
            const name = [user.first_name, user.last_name].filter(Boolean).join(' ');
            saveAuth('tg', String(user.id), '', name);
            window.location.href = REDIRECT;
            return true;
        }
    }

    if (typeof vkBridge !== 'undefined') {
        try {
            vkBridge.send('VKWebAppInit');
            const info = await Promise.race([
                vkBridge.send('VKWebAppGetUserInfo'),
                new Promise((_, reject) => setTimeout(() => reject(), 1500))
            ]);
            if (info?.id) {
                const name = [info.first_name, info.last_name].filter(Boolean).join(' ');
                saveAuth('vk', String(info.id), '', name);
                window.location.href = REDIRECT;
                return true;
            }
        } catch (e) {}
    }

    return false;
}

const loadingEl = document.getElementById('authLoader');
const formEl = document.getElementById('authForm');

tryAutoLogin().then(auto => {
    loadingEl.style.display = 'none';
    if (!auto) {
        formEl.style.display = 'block';
    }
});

let currentTab = 'login';
document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        const btn = document.getElementById('authActionBtn');
        const nameField = document.getElementById('authNameField');
        if (currentTab === 'register') {
            btn.textContent = 'Зарегистрироваться';
            btn.className = 'auth-btn auth-btn-register';
            nameField.style.display = 'block';
        } else {
            btn.textContent = 'Войти';
            btn.className = 'auth-btn auth-btn-login';
            nameField.style.display = 'none';
        }
        document.getElementById('authError').style.display = 'none';
        document.getElementById('authSuccess').style.display = 'none';
    });
});

document.getElementById('authActionBtn').addEventListener('click', async () => {
    const login = document.getElementById('authLogin').value.trim();
    const password = document.getElementById('authPassword').value;
    const name = document.getElementById('authName').value.trim() || login;
    const errorEl = document.getElementById('authError');
    const successEl = document.getElementById('authSuccess');

    if (!login || !password) {
        errorEl.textContent = 'Заполните все поля';
        errorEl.style.display = 'block';
        return;
    }

    errorEl.style.display = 'none';
    successEl.style.display = 'none';

    const btn = document.getElementById('authActionBtn');
    btn.disabled = true;
    btn.textContent = 'Подождите...';

    try {
        const action = currentTab === 'register' ? 'register' : 'login';
        const params = new URLSearchParams({ action, login, password });
        if (action === 'register') params.set('creator_name', name);

        const res = await fetch(`${API_URL}?${params.toString()}`);
        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || 'Ошибка');
        }

        if (currentTab === 'register') {
            successEl.textContent = 'Регистрация успешна! Теперь войдите.';
            successEl.style.display = 'block';
        } else {
            saveAuth('user', login, password, name);
            window.location.href = 'editor.html';
            return;
        }
    } catch (e) {
        const code = e.message;
        if (code === 'invalid_credentials') {
            errorEl.textContent = 'Неправильный логин или пароль';
        } else if (code === 'login_taken') {
            errorEl.textContent = 'Этот логин уже занят';
        } else if (code === 'login_must_contain_letter') {
            errorEl.textContent = 'Логин должен содержать хотя бы одну букву';
        } else if (code === 'login_no_hyphen') {
            errorEl.textContent = 'Логин не может содержать дефис';
        } else if (code === 'login_min_2_password_min_3') {
            errorEl.textContent = 'Логин минимум 2 символа, пароль минимум 3';
        } else if (code === 'missing_fields') {
            errorEl.textContent = 'Заполните все поля';
        } else {
            errorEl.textContent = code;
        }
        errorEl.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = currentTab === 'register' ? 'Зарегистрироваться' : 'Войти';
    }
});
</script>
</body>
</html>
